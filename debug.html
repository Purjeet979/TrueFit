<!DOCTYPE html>
<html><head><title>Pipeline Debug</title></head>
<body style="background:#111;color:#eee;font-family:monospace;padding:20px;">
<h2>TalentLens Pipeline Debug Console</h2>
<pre id="output" style="white-space:pre-wrap;font-size:12px;line-height:1.6;"></pre>
<script type="module">
import { nlpParse } from './js/pipeline/nlpParse.js';
import { tfidfVectorise } from './js/pipeline/tfidf.js';
import { cosineSimilaritySearch } from './js/pipeline/cosine.js';
import { multiSignalReRank, semanticScore, careerTrajectoryScore, activityScore, skillsDepthScore, culturalAlignmentScore, weightedCandidateSkillMatch } from './js/pipeline/rerank.js';
import { generateNarrative } from './js/pipeline/narrative.js';
import { CONFIG } from './js/config.js';

const out = document.getElementById('output');
function log(msg) { out.textContent += msg + '\n'; }
function logSection(title) { log('\n' + '='.repeat(60)); log(`  ${title}`); log('='.repeat(60)); }

try {
  // Load candidates
  const res = await fetch('./sample_candidates.json');
  const candidates = await res.json();
  log(`✅ Loaded ${candidates.length} candidates`);

  // Test JD: Senior ML Engineer preset
  const jdText = `Senior Machine Learning Engineer — FinTech Startup (Series B)
We're looking for a Senior ML Engineer to join our core AI team building next-generation fraud detection and credit risk models.
REQUIRED SKILLS:
- Python, PyTorch or TensorFlow
- NLP, deep learning, transformer architectures
- Experience with ML model deployment (MLflow, BentoML, or similar)
- Strong understanding of statistical modeling and feature engineering
- 5+ years of experience in ML/AI roles
PREFERRED:
- Experience with large language models (LLMs) and fine-tuning
- Knowledge of Spark, Airflow for data pipeline orchestration
- Cloud platforms (AWS, GCP, or Azure)
- Experience in fintech or financial services domain
- Leadership experience, mentoring junior engineers
ABOUT THE ROLE:
- Hybrid work mode (Bangalore preferred)
- Lead a team of 3-4 ML engineers
- Ship production ML systems serving 10M+ predictions/day
- Collaborate with data engineering and product teams`;

  // ============ STAGE 1: NLP Parse ============
  logSection('STAGE 1: NLP Parse');
  const t1 = performance.now();
  const jdSignals = nlpParse(jdText);
  const t1End = performance.now();
  log(`⏱ Time: ${(t1End - t1).toFixed(1)}ms`);
  log(`Seniority: ${jdSignals.seniority}`);
  log(`Domain: ${jdSignals.domain}`);
  log(`Min Experience: ${jdSignals.minExperience}`);
  log(`Requires Leadership: ${jdSignals.requiresLeadership}`);
  log(`Role Family: ${jdSignals.roleFamily}`);
  log(`Required Skills (${jdSignals.requiredSkills.length}): ${jdSignals.requiredSkills.join(', ')}`);
  log(`Preferred Skills (${jdSignals.preferredSkills.length}): ${jdSignals.preferredSkills.join(', ')}`);
  log(`All Skills (${jdSignals.allSkills.length}): ${jdSignals.allSkills.join(', ')}`);
  log(`OR Groups: ${JSON.stringify(jdSignals.orGroups)}`);
  log(`Constraints: ${JSON.stringify(jdSignals.constraints)}`);

  // ============ STAGE 2: TF-IDF ============
  logSection('STAGE 2: TF-IDF Vectorise');
  const t2 = performance.now();
  const { jdVector, candidateVectors, vocabulary } = tfidfVectorise(jdText, candidates);
  const t2End = performance.now();
  log(`⏱ Time: ${(t2End - t2).toFixed(1)}ms`);
  log(`Vocabulary size: ${vocabulary.length}`);
  log(`JD vector terms: ${Object.keys(jdVector).length}`);
  log(`Top 10 JD terms: ${Object.entries(jdVector).sort((a,b) => b[1]-a[1]).slice(0,10).map(([k,v]) => `${k}(${v.toFixed(2)})`).join(', ')}`);

  // ============ STAGE 3: Cosine Similarity ============
  logSection('STAGE 3: Cosine Similarity Search');
  const t3 = performance.now();
  const similarities = cosineSimilaritySearch(jdVector, candidateVectors, vocabulary);
  const t3End = performance.now();
  log(`⏱ Time: ${(t3End - t3).toFixed(1)}ms`);

  const sortedSim = [...similarities].sort((a,b) => b.similarity - a.similarity);
  log(`\nTop 10 by Cosine Similarity:`);
  sortedSim.slice(0, 10).forEach((s, i) => {
    const c = candidates[s.index];
    log(`  #${i+1}: ${c.profile.anonymized_name} (${c.profile.current_title}) — sim: ${s.similarity.toFixed(4)}`);
  });

  log(`\nBottom 5 by Cosine Similarity:`);
  sortedSim.slice(-5).forEach(s => {
    const c = candidates[s.index];
    log(`  ${c.profile.anonymized_name} (${c.profile.current_title}) — sim: ${s.similarity.toFixed(4)}`);
  });

  // ============ STAGE 4: Multi-Signal Re-Rank ============
  logSection('STAGE 4: Multi-Signal Re-Rank');
  const weights = { ...CONFIG.defaultWeights };
  const t4 = performance.now();
  const results = multiSignalReRank(candidates, similarities, jdSignals, weights, candidates);
  const t4End = performance.now();
  log(`⏱ Time: ${(t4End - t4).toFixed(1)}ms`);
  log(`Results returned: ${results.length}`);

  // Detailed score breakdown for each candidate
  log(`\n--- Full Ranked Results ---`);
  results.forEach((r, i) => {
    const c = r.candidate;
    const p = c.profile;
    const sm = r.skillMatch;
    log(`\n#${i+1}: ${p.anonymized_name} | ${p.current_title} @ ${p.current_company}`);
    log(`  Composite: ${r.composite.toFixed(1)} (raw: ${r.rawComposite.toFixed(1)}) | Fit: ${r.fitLabel}`);
    log(`  Semantic: ${r.scores.semantic.toFixed(1)} | Career: ${r.scores.career.toFixed(1)} | Activity: ${r.scores.activity.toFixed(1)} | Skills: ${r.scores.skills.toFixed(1)} | Culture: ${r.scores.culture.toFixed(1)}`);
    log(`  Cosine Sim: ${r.similarity.toFixed(4)}`);
    log(`  Skill Match: ${sm.matched}/${sm.total} (ratio: ${sm.ratio.toFixed(2)})`);
    log(`  Matched: [${sm.matchedSkills.join(', ')}]`);
    log(`  Missing:  [${sm.unmatchedSkills.join(', ')}]`);
    log(`  Required Missing: [${sm.requiredMissing?.join(', ') || 'none'}]`);
    if (sm.matches) {
      log(`  Match Evidence:`);
      sm.matches.forEach(m => {
        log(`    ${m.skill}: ${m.source} (credit: ${m.credit.toFixed(2)}) — ${m.details}`);
      });
    }
    log(`  Exp: ${p.years_of_experience}y | Location: ${p.location} | OTW: ${c.redrob_signals?.open_to_work_flag}`);
    log(`  GitHub: ${c.redrob_signals?.github_activity_score} | Saves: ${c.redrob_signals?.saved_by_recruiters_30d} | IntCompl: ${c.redrob_signals?.interview_completion_rate}`);
  });

  // ============ STAGE 5: Narrative Generation ============
  logSection('STAGE 5: Narrative Generation');
  let baselineDate = new Date("2026-01-01");
  let maxActiveTime = 0;
  candidates.forEach(c => {
    if (c.redrob_signals && c.redrob_signals.last_active_date) {
      const d = new Date(c.redrob_signals.last_active_date).getTime();
      if (d > maxActiveTime) maxActiveTime = d;
    }
  });
  if (maxActiveTime > 0) baselineDate = new Date(maxActiveTime);

  const top3 = results.slice(0, 3);
  top3.forEach((r, i) => {
    const t5 = performance.now();
    const narrative = generateNarrative(r, jdSignals, baselineDate);
    const t5End = performance.now();
    log(`\n--- #${i+1}: ${r.candidate.profile.anonymized_name} (${(t5End - t5).toFixed(1)}ms) ---`);
    log(`  whyChosen: ${narrative.whyChosen}`);
    log(`  recruiterSummary: ${narrative.recruiterSummary}`);
    log(`  Strengths (${narrative.strengths.length}):`);
    narrative.strengths.forEach(s => log(`    ✓ ${s}`));
    log(`  Concerns (${narrative.concerns.length}):`);
    narrative.concerns.forEach(c => log(`    [${c.tierLabel}] ${c.text}`));
    log(`  Probes (${narrative.probes.length}):`);
    narrative.probes.forEach(q => log(`    ? ${q}`));
    log(`  Receptivity: ${narrative.receptivity.toFixed(0)}%`);
  });

  logSection('PIPELINE COMPLETE ✅');
  log(`Total pipeline time: ${(performance.now() - t1).toFixed(1)}ms`);

} catch (err) {
  log(`❌ ERROR: ${err.message}`);
  log(err.stack);
}
</script>
</body></html>
