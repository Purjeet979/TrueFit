# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Gemini"

ai_usage_summary: |
  Used Claude and Gemini for architecture discussion, code review, and debugging.
  No candidate data was fed to any LLM. All ranking logic is deterministic
  and rule-based. The scoring engine uses Scikit-Learn for TF-IDF 
  and multi-signal heuristic scoring — zero LLM API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  7-stage pipeline processing 100K candidates in 31.6s in the latest full local CPU run. Stage 1-2: load
  and hard-filter (experience, technical relevance). Stage 3: honeypot detection
  using 10 independent signals (expert-with-zero-duration, title-skill mismatch,
  impossible tenure, impossible progression, etc.). Stage 4: TF-IDF cosine similarity using JD-vocabulary-
  only vectorization via Scikit-Learn. Stage 5: 5-dimensional composite scoring — Role Fit (30%),
  Skills Depth (25%), Career Quality (20%), Behavioral Signals (15%), Cultural
  Alignment (10%). Key innovations: consulting-firm-entire-career penalty, recent-only-AI penalty, 
  keyword-stuffer detection, hidden gem detection for pre-LLM experience, 
  production experience text analysis, TF-IDF global multiplier, and log-scaled behavioral signal normalization.
  Engine: Python, Scikit-Learn, NumPy.

